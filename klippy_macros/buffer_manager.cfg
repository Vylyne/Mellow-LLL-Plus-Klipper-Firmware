[gcode_macro LOAD_FILAMENT]
gcode:
    {% set tool = params.TOOL|default("T" ~ printer.toolchanger.tool_number)|upper %}
    {% set buffer = namespace(name="") %}
    {% for key in printer %}
        {% if key.startswith("buffer_manager ") %}
            {% if "T" ~ printer[key].tool == tool %}
                {% set buffer.name = key %}
            {% endif %}
        {% endif %}
    {% endfor %}
    {% if not buffer.name %}
        { action_raise_error("LOAD_FILAMENT: unknown tool '%s' (no %s)" % (tool, buffer.name)) }
    {% endif %}
    BUFFER_LOAD BUFFER={buffer.name.removeprefix("buffer_manager ").strip()} TIMEOUT=60000
    _BUFFER_JOB_POLL TOOL={tool} BUFFER={buffer.name} JOB=LOAD

[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% set tool = params.TOOL|default("T" ~ printer.toolchanger.tool_number)|upper %}
    {% set buffer = namespace(name="") %}
    {% for key in printer %}
        {% if key.startswith("buffer_manager ") %}
            {% if "T" ~ printer[key].tool == tool %}
                {% set buffer.name = key %}
            {% endif %}
        {% endif %}
    {% endfor %}
    {% if not buffer.name %}
        { action_raise_error("UNLOAD_FILAMENT: unknown tool '%s' (no %s)" % (tool, buffer.name)) }
    {% endif %}
    BUFFER_UNLOAD BUFFER={buffer.name.removeprefix("buffer_manager ").strip()} TIMEOUT=60000
    _BUFFER_JOB_POLL TOOL={tool} BUFFER={buffer.name} JOB=UNLOAD

[gcode_macro _BUFFER_JOB_POLL]
gcode:
    {% set tool = params.TOOL %}
    {% set job = params.JOB %}
    {% set buffer = printer[params.BUFFER] %}
    {% if buffer.job_pending %}
        G4 P250
        _BUFFER_JOB_POLL TOOL={tool} BUFFER={params.BUFFER} JOB={job}
    {% else %}
        _BUFFER_JOB_RESULT TOOL={tool} JOB={job} STATUS={buffer.last_result_status}
    {% endif %}

[gcode_macro _BUFFER_JOB_RESULT]
gcode:
    {% set tool = params.TOOL %}
    {% set job = params.JOB %}
    {% set status = params.STATUS|int %}
    {% set labels = {0: "OK", 1: "STALLED", 2: "TIMEOUT", 3: "INTERRUPTED"} %}
    {% set label = labels.get(status, "UNKNOWN") %}
    {% if status == 0 %}
        RESPOND MSG="{job} complete: {tool}"
        # TODO: KNOMI success indication - stub. Wire up once KNOMI_CMD
        # gains a per-tool "job complete" state, e.g.:
        #   KNOMI_CMD:{tool} JOB_OK
    {% else %}
        RESPOND MSG="{job} FAILED on {tool}: {label}"
        # TODO: KNOMI failure indication - stub. Wire up once KNOMI_CMD
        # gains a per-tool "job failed" state, e.g.:
        #   KNOMI_CMD:{tool} JOB_FAIL REASON={label}
    {% endif %}