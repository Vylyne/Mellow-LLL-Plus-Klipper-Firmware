[gcode_macro _FILAMENT_JAM_DETECTED]
gcode:
    {% set tool = params.TOOL %}
    {% set svv = printer.save_variables.variables %}
    {% set now = printer.system_time %}
    {% set confirm_window = 5.0 %}  ; seconds - tune after real testing

    {% set key = "jam_pending_" ~ tool %}
    {% set last_t = svv.get(key, -1000) %}

    {% if printer.toolchanger is defined and printer.toolchanger.active_tool.name != tool %}
        ; not the active tool - stale/residual sensor state, ignore
        RESPOND MSG="Jam signal from inactive tool {tool}, ignoring"
    {% elif (now - last_t) <= confirm_window %}
        ; second detection within window -> confirmed, escalate
        RESPOND MSG="Filament jam CONFIRMED on {tool} - pausing"
        SAVE_VARIABLE VARIABLE={key} VALUE=-1000
        _FILAMENT_JAM_PAUSE TOOL={tool}
    {% else %}
        ; first detection - soft warning only, arm the confirm window
        RESPOND MSG="Possible filament jam on {tool}, watching..."
        SAVE_VARIABLE VARIABLE={key} VALUE={now}
    {% endif %}

[gcode_macro _FILAMENT_JAM_PAUSE]
gcode:
    {% set tool = params.TOOL %}
    {% if printer.toolchanger is defined %}
        SAVE_ACTIVE_TOOL STATE=jam_recovery
    {% endif %}
    RESPOND MSG="Paused: suspected jam, tool={tool}"
    PAUSE